# 军鸽云链数智 — 全站链接检查
# 触发: push (仅HTML变更) + 每日 08:00 + 手动
name: SEO Link Check

on:
  push:
    paths: ['**.html', '**.htm']
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:

jobs:
  dead-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base https://junge.中国
            --no-progress
            --max-concurrency 5
            --timeout 20
            --accept 200,301,302,403,429
            --exclude '^(https?://(localhost|127\.0\.0\.1|::1)|mailto:|tel:)'
            '**/*.html'
          format: markdown
          output: /tmp/lychee-report.md

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: /tmp/lychee-report.md

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/lychee-report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔗 链接检查发现死链',
              body: report.slice(0, 60000),
              labels: ['seo', 'bug']
            });
